<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi primer formulario para e-mails</title>
    <link rel="stylesheet" href="../CSS/formulario.css">
    <link rel="stylesheet" href="../CSS/estilinos.css">
</head>
<body background="../Imagenes/Fondos/Fondo8.png">
    <nav class="navbar">
        <ul>
            <li><a href="presentacion.html">Presentacion</a></li>
            <li><a href="generales.html">Generales</a></li>
            <li><a href="academicos.html">Academicos</a></li>

            <li class="menu"><a href="../index.html">Menu</a></li>
        </ul>
    </nav>
    <br>
    <br>
    <main>
    <form action="https://formspree.io/f/xkokpjrk" method="post">
        <p align="center"><font color="white"><font size="+2">Registrarse</font></font></p>
        <font color="white">
        <ul>
            <li>
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="user_name"/>
            </li>
            <li>
                <label for="mail">Correo Electrónico:</label>
                <input type ="email" id="mail" name="user_email"/>
            </li>
            <li>
                <label for="msg">Mensaje:</label>
                <textarea id="msg" name="user_message"></textarea> 
            </li>
            <br>
            <input type="submit" value="enviar">
        </ul>
        </font>
    </form>
    </main>

<div id="Apartado de Lagtrain">
    <audio id="Lagtrain" src="../Sonido/Lofi LagTrain.mp3" autoplay loop></audio>
    <script>
        const a = document.getElementById('Lagtrain');
        window.onload = () => {
            a.volume=0.3;
            a.currentTime = localStorage.getItem('pos') || 0;
            a.play();
        };
        window.onbeforeunload = () => {
            localStorage.setItem('pos', a.currentTime);
        };
    </script>
</div>
</body>
</html>
